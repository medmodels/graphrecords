name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        type: choice
        options:
          - rust
          - python
      version:
        description: "Version override (leave empty to use release-drafter's resolved version)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        if: inputs.target == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        if: inputs.target == 'rust'
        run: cargo install cargo-edit --locked

      - name: Install uv
        if: inputs.target == 'python'
        uses: astral-sh/setup-uv@v5

      - name: Get draft release
        id: draft
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-${{ inputs.target }}.yml
          disable-autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        env:
          VERSION_OVERRIDE: ${{ inputs.version }}
          RESOLVED_VERSION: ${{ steps.draft.outputs.resolved_version }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Version must be in semver format (e.g., 0.2.0)"
              exit 1
            fi
          else
            VERSION="$RESOLVED_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ steps.version.outputs.version }}
          release-notes: ${{ steps.draft.outputs.body }}
          path-to-changelog: CHANGELOG-${{ inputs.target }}.md
          heading-text: "[${{ steps.version.outputs.version }}]"

      - name: Bump Rust version
        if: inputs.target == 'rust'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: cargo set-version --workspace "$VERSION"

      - name: Bump Python version
        if: inputs.target == 'python'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: sed -i '0,/^version = ".*"/s//version = "'"$VERSION"'"/' pyproject.toml

      - name: Update uv.lock
        if: inputs.target == 'python'
        run: uv lock

      - name: Stage Rust files
        if: inputs.target == 'rust'
        run: git add CHANGELOG-rust.md Cargo.toml Cargo.lock

      - name: Stage Python files
        if: inputs.target == 'python'
        run: git add CHANGELOG-python.md pyproject.toml uv.lock

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ inputs.target }}
        run: |
          BRANCH="release/${TARGET}-${VERSION}"

          git checkout -b "$BRANCH"
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "release(${TARGET}): ${VERSION}"
          git push origin "$BRANCH"

          BODY="## Release ${TARGET} ${VERSION}

          This PR was automatically generated by the release workflow.

          ### Checklist
          - [ ] Changelog looks correct
          - [ ] Version numbers are correct"

          gh pr create \
            --title "release(${TARGET}): ${VERSION}" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
