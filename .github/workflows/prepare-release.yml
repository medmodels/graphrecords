name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        type: choice
        options:
          - rust
          - python
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g., 0.2.0)"
            exit 1
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff-${{ inputs.target }}.toml
          args: --tag ${{ inputs.target }}-${{ inputs.version }}
        env:
          OUTPUT: CHANGELOG-${{ inputs.target }}.md

      - name: Bump Rust version
        if: inputs.target == 'rust'
        run: |
          VERSION="${{ inputs.version }}"
          sed -i '/^\[workspace\.package\]$/,/^\[/ s/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i '/^# Workspace members$/,/^\[/ s/version = "[^"]*"/version = "'"$VERSION"'"/' Cargo.toml

      - name: Bump Python version
        if: inputs.target == 'python'
        run: |
          VERSION="${{ inputs.version }}"
          sed -i '0,/^version = ".*"/s//version = "'"$VERSION"'"/' pyproject.toml

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/${{ inputs.target }}-${{ inputs.version }}"

          git checkout -b "$BRANCH"
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "release(${{ inputs.target }}): ${{ inputs.version }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "release(${{ inputs.target }}): ${{ inputs.version }}" \
            --body "$(cat <<'EOF'
          ## Release ${{ inputs.target }} ${{ inputs.version }}

          This PR was automatically generated by the release workflow.

          ### Checklist
          - [ ] Changelog looks correct
          - [ ] Version numbers are correct
          EOF
          )" \
            --base main \
            --head "$BRANCH"
