name: Publish Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  PYTHON_VERSIONS_LONG: "python3.10 python3.11 python3.12 python3.13"
  PYTHON_VERSIONS_SHORT: |
    3.10
    3.11
    3.12
    3.13

jobs:
  detect-release:
    runs-on: ubuntu-22.04
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      target: ${{ steps.check.outputs.target }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - name: Check for release commit
        id: check
        run: |
          FIRST_LINE=$(echo "${{ github.event.head_commit.message }}" | head -1)

          if echo "$FIRST_LINE" | grep -qE '^release\((rust|python)\): [0-9]+\.[0-9]+\.[0-9]+'; then
            TARGET=$(echo "$FIRST_LINE" | sed 's/release(\(.*\)):.*/\1/')
            VERSION=$(echo "$FIRST_LINE" | sed 's/release([^)]*): \([0-9.]*\).*/\1/')
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=${TARGET}-${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    needs: detect-release
    if: needs.detect-release.outputs.is_release == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag "${{ needs.detect-release.outputs.tag }}"
          git push origin "${{ needs.detect-release.outputs.tag }}"

  extract-changelog:
    needs: [detect-release, create-tag]
    if: needs.detect-release.outputs.is_release == 'true'
    runs-on: ubuntu-22.04
    outputs:
      changelog: ${{ steps.extract.outputs.changelog }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog for version
        id: extract
        run: |
          TARGET="${{ needs.detect-release.outputs.target }}"
          VERSION="${{ needs.detect-release.outputs.version }}"
          FILE="CHANGELOG-${TARGET}.md"

          CHANGELOG=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" "$FILE")

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  publish-rust:
    needs: [detect-release, create-tag]
    if: needs.detect-release.outputs.target == 'rust'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish graphrecords-utils
        run: cargo publish -p graphrecords-utils
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish graphrecords-core
        run: cargo publish -p graphrecords-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish graphrecords
        run: cargo publish -p graphrecords
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish graphrecords-python
        run: cargo publish -p graphrecords-python
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish graphrecords-pyo3-interop
        run: cargo publish -p graphrecords-pyo3-interop
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-rust:
    needs: [detect-release, extract-changelog, publish-rust]
    runs-on: ubuntu-22.04

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.detect-release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Rust ${{ needs.detect-release.outputs.version }}" \
            --notes "${{ needs.extract-changelog.outputs.changelog }}"

  build-linux:
    needs: detect-release
    if: needs.detect-release.outputs.target == 'python'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7, ppc64le]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSIONS_SHORT }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i ${{ env.PYTHON_VERSIONS_LONG }}
          sccache: "true"
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  build-musllinux:
    needs: detect-release
    if: needs.detect-release.outputs.target == 'python'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSIONS_SHORT }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i ${{ env.PYTHON_VERSIONS_LONG }}
          sccache: "true"
          manylinux: musllinux_1_2

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  build-windows:
    needs: detect-release
    if: needs.detect-release.outputs.target == 'python'
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSIONS_SHORT }}
          architecture: ${{ matrix.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i ${{ env.PYTHON_VERSIONS_LONG }}
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  build-macos:
    needs: detect-release
    if: needs.detect-release.outputs.target == 'python'
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSIONS_SHORT }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i ${{ env.PYTHON_VERSIONS_LONG }}
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  build-sdist:
    needs: detect-release
    if: needs.detect-release.outputs.target == 'python'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-python:
    needs:
      - detect-release
      - create-tag
      - build-linux
      - build-musllinux
      - build-windows
      - build-macos
      - build-sdist
    runs-on: ubuntu-22.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*

  release-python:
    needs: [detect-release, extract-changelog, publish-python]
    runs-on: ubuntu-22.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.detect-release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Python ${{ needs.detect-release.outputs.version }}" \
            --notes "${{ needs.extract-changelog.outputs.changelog }}" \
            wheels-*/*
