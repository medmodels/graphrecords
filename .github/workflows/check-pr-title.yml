name: Check PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-title:
    runs-on: ubuntu-22.04

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            ci
            chore
            test
            build
            release
          scopes: |
            rust
            python
          requireScope: false

      - name: Label PR based on scope
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;

            const typeMatch = title.match(/^(\w+)/);
            const scopeMatch = title.match(/^\w+\((\w+)\)/);
            const isBreaking = /^\w+(\(\w+\))?!:/.test(title);

            const labelsToAdd = [];
            const skipScopeTypes = ['ci', 'chore'];
            const type = typeMatch ? typeMatch[1] : '';

            if (!skipScopeTypes.includes(type)) {
              if (scopeMatch) {
                labelsToAdd.push(scopeMatch[1]);
              } else {
                labelsToAdd.push('rust', 'python');
              }
            }

            if (isBreaking) {
              labelsToAdd.push('breaking');
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: labelsToAdd,
              });
            }

  rust-semver-checks:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Build workspace
        run: cargo build --workspace --exclude py-graphrecords

      - name: Run semver checks
        id: semver
        continue-on-error: true
        run: >
          cargo semver-checks check-release
          --workspace
          --exclude py-graphrecords
          --baseline-rev ${{ github.event.pull_request.base.sha }}

      - name: Check breaking change disclosure
        if: steps.semver.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const isBreaking = /^\w+(\(\w+\))?!:/.test(title);

            if (!isBreaking) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: [
                  '**Rust breaking changes detected**',
                  '',
                  '`cargo-semver-checks` has detected breaking API changes in this pull request',
                  'that were not properly disclosed.',
                  '',
                  'If this is intentional, update the PR title to include a breaking change',
                  'indicator (`!`), for example: `feat!: description` or `feat(rust)!: description`.',
                  '',
                  'See the workflow logs for details on what changed.',
                ].join('\n'),
              });

              core.setFailed(
                'Breaking Rust API changes detected but not disclosed. Add ! to the PR title to acknowledge.'
              );
            }

  python-semver-checks:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run griffe check
        id: griffe
        run: |
          set +e
          uvx griffe check graphrecords \
            --against ${{ github.event.pull_request.base.sha }} \
            --format github
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "result=breaking" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::griffe check failed with exit code $EXIT_CODE (not a breaking change detection)"
            echo "result=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Check breaking change disclosure
        if: steps.griffe.outputs.result == 'breaking'
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const isBreaking = /^\w+(\(\w+\))?!:/.test(title);

            if (!isBreaking) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: [
                  '**Python breaking changes detected**',
                  '',
                  '`griffe` has detected breaking API changes in the Python package',
                  'that were not properly disclosed.',
                  '',
                  '> **Note:** `griffe` usage for breaking change detection is still in trial.',
                  '> This may be a false positive. Check the workflow logs to verify.',
                  '',
                  'If this is intentional, update the PR title to include a breaking change',
                  'indicator (`!`), for example: `feat!: description` or `feat(python)!: description`.',
                  '',
                  'See the workflow logs for details on what changed.',
                ].join('\n'),
              });

              core.setFailed(
                'Breaking Python API changes detected but not disclosed. Add ! to the PR title to acknowledge.'
              );
            }
